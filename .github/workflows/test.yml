on: [push]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    name: Test Linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.17.0'

  test-linux-container:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:8.0
    name: Test Linux Container
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.17.0'

  test-linux-packages:
    runs-on: ubuntu-latest
    name: Test Linux (Packages)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.17.0'
          # Demonstration pinned to 9.0.7 (last stable without WPF Controls dependency).
          # Demonstration:any resolves to 9.1.0 which depends on WPF Controls ^9.31.0-rc.2+c39a4f1f,
          # published only as AnyCPU — the OpenTAP resolver fails to match it against x64 Linux (exit code 33).
          packages: 'Demonstration:9.0.7,PackagePublish:rc,TUI:any'

  test-win:
    runs-on: windows-2022
    name: Test Windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.17.0'    

  test-macos:
    runs-on: macos-14
    name: Test MacOS
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.17.0'

  test-macos-packages:
    runs-on: macos-14
    name: Test MacOS (Packages)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.19.1'
          packages: 'Runner,TUI:any'

  test-user-token:
    runs-on: ubuntu-latest
    name: Test Installing Private Packages
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.22.0-beta.1'
          packages: 'Sign,Dotfuscator,DocumentationGeneration'
          additional-repository: 'https://test-automation.pw.keysight.com/api/packages'
          token: ${{ secrets.OPENTAP_USERTOKEN }}

  test-additional-user-token:
    runs-on: ubuntu-latest
    name: Test Installing Private Packages 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: 9.23.0
          packages: 'DocumentationGeneration:1.0.2'
          additional-repository: 'https://test-automation.pw.keysight.com/api/packages'
          additional-repository-token: '${{ secrets.KS8500_REPO_TOKEN }}'
      - run: tap package list --version any | grep '^ESD'

  test-packages-with-spaces:
    runs-on: ubuntu-latest
    name: Test Packages With Spaces In Names
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./ # Uses an action in the root directory
        id: setup
        with:
          version: '9.21.0'
          packages: 'Editor X:1.5.0-beta.41+2c6d736c,NATS Server,CSV'
